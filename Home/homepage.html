<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe with Grid Areas</title>
    <link rel="stylesheet" href="homepge_style.css">
</head>
<body>

    <!-- KHUNG CHÍNH ÁP DỤNG GRID AREA -->
    <div class="wrapper">
         <div class="wel_tile">
                <h5> text here</h5>
            </div>
        <!-- HEADER -->
        <header class="header">
           
            <div class="top-bar">
                <div class="box logo-box">
                    <img src="/web-ban-hang-linh-kien-dien-tu/assets/logo/chuot.png">
                </div>
                <div class="box search-box"></div>
                <div class="box action-box"></div>
            </div>
            <div class="nav-bar"></div>
        </header>

        <!-- HERO SECTION (Cũng áp dụng Grid Area) -->
        <section class="hero-grid">
            <div class="hero-main"></div>
            <div class="hero-sub1"></div>
            <div class="hero-sub2"></div>
        </section>

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sb-box green-box"></div>
            <div class="sb-box blue-box"></div>
            <div class="sb-box tall-yellow-box"></div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content-area">
            <div class="content-row grid-4-cols">
                <div class="item"></div><div class="item"></div><div class="item"></div><div class="item"></div>
            </div>
            
            <div class="content-row grid-4-cols">
                <div class="item"></div><div class="item"></div><div class="item"></div><div class="item"></div>
            </div>

            <div class="content-row grid-3-cols box-inner">
                <div class="item"></div><div class="item"></div><div class="item"></div>
                <div class="item"></div><div class="item"></div><div class="item"></div>
            </div>
        </main>

        <!-- BOTTOM BANNER -->
        <div class="bottom-banner"></div>
            <!-- FOOTER -->
        <footer class="footer"></footer>
    </div>


    

</body>
</html>
